services:
  - type: web
    name: pms-web-app
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /data/pms.db
      - key: INITIAL_ADMIN_USERNAME
        value: admin
      - key: INITIAL_ADMIN_PASSWORD
        value: change-this-now
      - key: INITIAL_ADMIN_NAME
        value: 대표 관리자
      - key: ENABLE_DEMO_USERS
        value: false
      - key: ENABLE_DEMO_DATA
        value: false
    disk:
      name: pms-data
      mountPath: /data
      sizeGB: 1
