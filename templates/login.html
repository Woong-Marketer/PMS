{% extends 'base.html' %}
{% block title %}로그인 | 사내 PMS{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-2">리쿠스 통합 업무관리 PMS</h1>
                    <p class="text-muted mb-0">로그인 또는 회원가입 신청 후 관리자 승인으로 사용을 시작합니다.</p>
                </div>
                <form method="post" class="vstack gap-3">
                    <div>
                        <label class="form-label">아이디</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="아이디 입력" required>
                    </div>
                    <div>
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="비밀번호 입력" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
                </form>
                <div class="d-grid mt-3">
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-lg">회원가입 신청</a>
                </div>
                <div class="demo-box mt-4 small">
                    <div class="fw-semibold mb-2">운영 방식 안내</div>
                    <ul class="mb-0 ps-3">
                        <li>회원가입 후 바로 로그인되지 않습니다.</li>
                        <li>대표 관리자가 승인하고 권한을 부여해야 사용 가능합니다.</li>
                        <li>초기 대표 관리자 계정은 배포 시 환경변수로 설정합니다.</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
