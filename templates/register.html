{% extends 'base.html' %}
{% block title %}회원가입 신청 | 사내 PMS{% endblock %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-lg-5 col-xl-4">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-lg-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold mb-2">회원가입 신청</h1>
                    <p class="text-muted mb-0">신청 후 대표 관리자 승인 시 로그인할 수 있습니다.</p>
                </div>
                <form method="post" class="vstack gap-3">
                    <div>
                        <label class="form-label">이름</label>
                        <input type="text" name="name" class="form-control form-control-lg" placeholder="이름 입력" required>
                    </div>
                    <div>
                        <label class="form-label">아이디</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="아이디 입력" required>
                    </div>
                    <div>
                        <label class="form-label">비밀번호</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="비밀번호 입력" required>
                    </div>
                    <div>
                        <label class="form-label">부서</label>
                        <select name="department_id" class="form-select form-select-lg" required>
                            <option value="">부서 선택</option>
                            {% for dep in departments %}
                            <option value="{{ dep.id }}" {% if selected_department_id == dep.id|string %}selected{% endif %}>{{ dep.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">회원가입 신청</button>
                </form>
                <div class="d-grid mt-3">
                    <a href="{{ url_for('login') }}" class="btn btn-light btn-lg">로그인으로 돌아가기</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
